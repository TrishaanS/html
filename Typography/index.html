<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography</title>
</head>
<style>
    .para1{
        color: rgb(62, 19, 66);
        font-size: 30px;
    }
    .para2{
        color: yellowgreen;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-transform: capitalize;
        text-decoration: underline;
    }
    div{
        width: 500px;
        height: 200px;
        background-color: rgba(29, 61, 70, 0.596);
        border: 3px solid blue;
        transform: rotateX(170deg);
    }
    h1{
        text-shadow: 2px 2px 1px crimson;
    }
</style>
<body>
    
<h1>Typography</h1>
    <br>
    <div>
        <p class="para1">I am learning about Typography</p>
        <p class="para2">my name is Trishaan</p>
    </div>
</body>
</html>
